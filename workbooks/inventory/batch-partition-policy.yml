version: 0.17.0
workbook: inventory
partitionKeys:
  - productId
  - warehouseId
foreignKeys:
  - field: productId
    references: products.id
  - field: warehouseId
    references: warehouses.id
formulaReferences:
  - field: quantity_available
    dependsOn:
      - quantity_on_hand
      - quantity_reserved
  - field: totalValue
    dependsOn:
      - quantity_on_hand
      - unit_cost
aggregateDependencies: []
customDomainRules:
  - name: positiveStock
    expression: "quantity_on_hand >= 0"
  - name: nonNegativeReserved
    expression: "quantity_reserved >= 0"
fallbackBehavior: reject
